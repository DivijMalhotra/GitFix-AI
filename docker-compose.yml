version: '3.9'

services:
  mongodb:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ai-debugger
    dns:
      - 8.8.8.8
      - 8.8.4.4

  chromadb:
    image: chromadb/chroma:0.4.24
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    dns:
      - 8.8.8.8
      - 8.8.4.4

  ai-engine:
    build: ./ai-engine
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    volumes:
      - ./ai-engine:/app
      - repo_clones:/tmp/repos
    depends_on:
      - chromadb
    dns:
      - 8.8.8.8
      - 8.8.4.4

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/ai-debugger
      - AI_ENGINE_URL=http://ai-engine:8000
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_CALLBACK_URL=${GITHUB_CALLBACK_URL}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    volumes:
      - repo_clones:/tmp/repos
    depends_on:
      - mongodb
      - ai-engine
    dns:
      - 8.8.8.8
      - 8.8.4.4

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    depends_on:
      - backend
    dns:
      - 8.8.8.8
      - 8.8.4.4

volumes:
  mongo_data:
  chroma_data:
  repo_clones:
